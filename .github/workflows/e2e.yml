name: e2e

on:
  push:
    branches: [main, rebuild]
  pull_request:
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: Regenerate the admin-visual baseline snapshots instead of asserting against them
        type: boolean
        default: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Only the manual regen dispatch needs to push a commit back to the branch it ran against;
    # the routine push/pull_request runs never reach that step.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      # The showcase lockfile is committed (not gitignored) and installed with `npm ci` so CI resolves
      # the exact toolchain a developer reproduces locally. A floating `npm install` once drifted CI onto
      # a Vite 8 / Rolldown build that no local run could reproduce; see the post-mortem at
      # docs/internal/2026-06-21-e2e-dist-svelte-build-failure.md.
      - run: npm ci --prefix examples/showcase
      - run: npx --prefix examples/showcase playwright install --with-deps chromium
      # A DEFAULT build (no VITE_CAIRN_E2E) proves the fence holds: the build-foldable gate folds
      # away, so the dev backend and its owner-session bypass are eliminated from the deployable
      # bundle. test:e2e's own webServer then does the flagged build (VITE_CAIRN_E2E=1) + preview to
      # run the specs, so this default-build grep must run first.
      - run: npm --prefix examples/showcase run build
      - name: Assert the dev backend is eliminated from the default build
        # Grep the deployable Cloudflare Worker (.svelte-kit/cloudflare), not .svelte-kit/output: the
        # latter always carries a dead, unreferenced split chunk for the gated dynamic import, which
        # the adapter prunes from the deployable Worker.
        run: |
          if grep -rl -e 'editor@showcase.test' -e 'createDevBackend' -e 'devBackendHandle' -e 'cairn-cms-dev' -e 'dev-token' -e 'sk-showcase-stub' -e 'createFakeAuthDb' -e 'createFakeR2' -e 'createFakeAnthropic' -e 'lastRecordedCommit' -e 'committedFile' examples/showcase/.svelte-kit/cloudflare 2>/dev/null; then
            echo "FAIL: dev-backend artifact in the deployable Worker"; exit 1
          fi
          echo "OK: no dev-backend artifact in the deployable Worker"
      - name: Run the e2e suite
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.update_snapshots == 'true') }}
        run: npm --prefix examples/showcase run test:e2e
      # Manual regen mode: a dispatcher ticks `update_snapshots` after a deliberate rendering
      # change. Runs both visual specs BY FILE PATH (never a title grep, which silently skips
      # any test whose name doesn't match), on the CI runner itself, since baselines are
      # CI-canonical and a workstation render is never an acceptable substitute. Commits the
      # changed PNGs straight back to the branch the dispatch ran against, the same
      # checkout-commit-push shape as aksailingclub-org's ci.yml; nothing here uploads an
      # artifact for manual copy-back.
      - name: Regenerate the visual baseline snapshots
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.update_snapshots == 'true' }}
        run: npm --prefix examples/showcase run test:e2e -- e2e/admin-visual.spec.ts e2e/site-visual.spec.ts --update-snapshots
      - name: Commit the regenerated visual baselines
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.update_snapshots == 'true' }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add examples/showcase/e2e/admin-visual.spec.ts-snapshots/ examples/showcase/e2e/site-visual.spec.ts-snapshots/
          if git diff --staged --quiet; then
            echo "No baseline changes to commit."
          else
            git commit -m "chore(e2e): regenerate the admin-visual and site-visual baselines"
            git push
          fi
