name: e2e

on:
  push:
    branches: [main, rebuild]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      # The showcase lockfile is committed (not gitignored) and installed with `npm ci` so CI resolves
      # the exact toolchain a developer reproduces locally. A floating `npm install` once drifted CI onto
      # a Vite 8 / Rolldown build that no local run could reproduce; see the post-mortem at
      # docs/internal/2026-06-21-e2e-dist-svelte-build-failure.md.
      - run: npm ci --prefix examples/showcase
      - run: npx --prefix examples/showcase playwright install --with-deps chromium
      - run: npm --prefix examples/showcase run test:e2e
