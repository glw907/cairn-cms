name: e2e

on:
  push:
    branches: [main, rebuild]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      # The showcase lockfile is committed (not gitignored) and installed with `npm ci` so CI resolves
      # the exact toolchain a developer reproduces locally. A floating `npm install` once drifted CI onto
      # a Vite 8 / Rolldown build that no local run could reproduce; see the post-mortem at
      # docs/internal/2026-06-21-e2e-dist-svelte-build-failure.md.
      - run: npm ci --prefix examples/showcase
      - run: npx --prefix examples/showcase playwright install --with-deps chromium
      # A DEFAULT build (no VITE_CAIRN_E2E) proves the fence holds: the build-foldable gate folds
      # away, so the dev backend and its owner-session bypass are eliminated from the deployable
      # bundle. test:e2e's own webServer then does the flagged build (VITE_CAIRN_E2E=1) + preview to
      # run the specs, so this default-build grep must run first.
      - run: npm --prefix examples/showcase run build
      - name: Assert the dev backend is eliminated from the default build
        # Grep the deployable Cloudflare Worker (.svelte-kit/cloudflare), not .svelte-kit/output: the
        # latter always carries a dead, unreferenced split chunk for the gated dynamic import, which
        # the adapter prunes from the deployable Worker.
        run: |
          if grep -rl -e 'editor@showcase.test' -e 'createDevBackend' -e 'devBackendHandle' -e 'cairn-cms-dev' -e 'dev-token' -e 'sk-showcase-stub' -e 'createFakeAuthDb' -e 'createFakeR2' -e 'createFakeAnthropic' -e 'lastRecordedCommit' -e 'committedFile' examples/showcase/.svelte-kit/cloudflare 2>/dev/null; then
            echo "FAIL: dev-backend artifact in the deployable Worker"; exit 1
          fi
          echo "OK: no dev-backend artifact in the deployable Worker"
      - run: npm --prefix examples/showcase run test:e2e
