name: Publish to npm

# Token-free publishing via npm Trusted Publishing (OIDC). No NPM_TOKEN secret:
# npm mints a short-lived credential from the GitHub OIDC token, and (for public
# repos) attaches build provenance automatically. Configure the trusted publisher
# once at npmjs.com → @glw907/cairn-cms → Settings → Trusted Publisher
# (repo: glw907/cairn-cms, workflow: publish.yml).
#
# Release flow: bump "version" in package.json, then either publish a GitHub
# Release or run this workflow manually. `prepublishOnly` (svelte-package) builds
# dist as part of `npm publish`.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # Trusted publishing requires npm >= 11.5.1 (newer than the bundled version).
      - run: npm install -g npm@latest
      - run: npm install --no-audit --no-fund
      # Validate the published package shape before releasing.
      - run: npm run check:package
      # Stable release: publish to the default `latest` tag. (Pre-releases used `--tag rc`
      # to keep `latest` on the live 0.5.x while the rebuild stabilized.)
      #
      # Provenance is disabled because the repo is private and provenance attestation
      # requires a public repository; npm would otherwise auto-enable it under OIDC and
      # fail the publish. Drop this env when the repo goes public to restore provenance.
      - run: npm publish --access public
        env:
          NPM_CONFIG_PROVENANCE: false
