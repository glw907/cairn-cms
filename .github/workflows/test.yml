name: test

on:
  push:
    branches: [main, rebuild]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          # Pin Node 22 LTS: vitest-pool-workers has a known console bug on Node 24.
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      # The component test project runs in real Chromium via @vitest/browser-playwright.
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - run: npm run check:package
      # SUSPENDED during the docs rewrite (Geoff, 2026-07-03) — re-enable as the tree refills
      # - run: npm run check:reference
      # SUSPENDED during the docs rewrite (Geoff, 2026-07-03) — re-enable as the tree refills
      # - run: npm run check:reference:signatures
      - run: npm run check:surface
      - run: npm run check:cm-internals
      - run: npm run check:readiness
      # SUSPENDED during the docs rewrite (Geoff, 2026-07-03) — re-enable as the tree refills
      # - run: npm run check:docs
      # SUSPENDED during the docs rewrite (Geoff, 2026-07-03) — re-enable as the tree refills
      # - run: npm run check:snippets
      - run: npm run check:prose
      - run: npm run check:version
      - run: npm run check:dev-package
      # The showcase lockfile is committed and installed with `npm ci` so this job resolves the
      # exact toolchain a developer reproduces locally, the same convention e2e.yml follows.
      - run: npm ci --prefix examples/showcase
      - run: npm run check:consumers
      - name: Install Vale 3.15.1
        run: |
          curl -sfL https://github.com/errata-ai/vale/releases/download/v3.15.1/vale_3.15.1_Linux_64-bit.tar.gz \
            | sudo tar -xz -C /usr/local/bin vale
          vale --version
      - run: npm run check:comments
