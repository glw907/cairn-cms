StylesPath = .vale/styles
MinAlertLevel = suggestion

Packages = Google

# Vale enforces the Google Developer Documentation Style Guide on the PUBLISHED developer
# docs only: the Diataxis arms (reference, guides, explanation, tutorial), the docs index, and the
# repo-root README (the npm and GitHub front door, published documentation like the rest).
# Code comments are linted by ESLint (TSDoc), not Vale.
[docs/**/*.md]
BasedOnStyles = Google, Cairn
; Deliberate deviation (Geoff, 2026-07-02): the authorial first person is the register for
; design decisions ("I chose X because"); do not "fix" the I-voice on published pages.
Google.FirstPerson = NO

[README.md]
BasedOnStyles = Google, Cairn
Google.FirstPerson = NO
; Geoff's voiced headings ("Love your editors!") are sanctioned.
Google.Exclamation = warning

# Internal planning and engineering docs are not published documentation, so they carry no
# Google styles: the specs and plans (also skipped by the global vale-hook), the post-mortems
# that live in the plans, the rolling status, the friction log and design records, and the
# loose feedback notes. This keeps the hook from spending tokens on advisory findings that do
# not matter for a write-once internal doc.
[docs/superpowers/**]
BasedOnStyles =

[docs/internal/**]
BasedOnStyles =

[docs/STATUS.md]
BasedOnStyles =

[docs/cairn-dx-feedback-*.md]
BasedOnStyles =

[examples/showcase/README.md]
BasedOnStyles = Vale, Google, Cairn
