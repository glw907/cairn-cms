@layer components {
  :where([data-theme="cairn-admin"], [data-theme="cairn-admin-dark"]) a {
    color: inherit;
    text-decoration: none;
  }

  :where([data-theme="cairn-admin"], [data-theme="cairn-admin-dark"]) summary {
    list-style: none;
  }

  :where([data-theme="cairn-admin"], [data-theme="cairn-admin-dark"]) summary::-webkit-details-marker {
    display: none;
  }

  :where([data-theme="cairn-admin"], [data-theme="cairn-admin-dark"]) .cairn-caret {
    transition: rotate .15s;
  }

  :where([data-theme="cairn-admin"], [data-theme="cairn-admin-dark"]) details[open] > summary .cairn-caret {
    rotate: 90deg;
  }

  :where([data-theme="cairn-admin"], [data-theme="cairn-admin-dark"]) ::selection {
    background-color: var(--color-primary);
  }

  @supports (color: color-mix(in lab, red, red)) {
    :where([data-theme="cairn-admin"], [data-theme="cairn-admin-dark"]) ::selection {
      background-color: color-mix(in oklch, var(--color-primary) 24%, transparent);
    }
  }

  :where([data-theme="cairn-admin"], [data-theme="cairn-admin-dark"]) :focus-visible {
    outline: 2px solid var(--color-primary);
    outline-offset: 2px;
  }

  :where([data-theme="cairn-admin"], [data-theme="cairn-admin-dark"]) .btn-primary:not(:disabled) {
    box-shadow: 0 1px 2px var(--color-primary), 0 6px 16px -5px var(--color-primary);
  }

  @supports (color: color-mix(in lab, red, red)) {
    :where([data-theme="cairn-admin"], [data-theme="cairn-admin-dark"]) .btn-primary:not(:disabled) {
      box-shadow: 0 1px 2px color-mix(in oklch, var(--color-primary) 22%, transparent), 0 6px 16px -5px color-mix(in oklch, var(--color-primary) 38%, transparent);
    }
  }

  :where([data-theme="cairn-admin"], [data-theme="cairn-admin-dark"]) .btn-primary:not(:disabled):hover {
    box-shadow: 0 2px 4px var(--color-primary), 0 10px 24px -5px var(--color-primary);
  }

  @supports (color: color-mix(in lab, red, red)) {
    :where([data-theme="cairn-admin"], [data-theme="cairn-admin-dark"]) .btn-primary:not(:disabled):hover {
      box-shadow: 0 2px 4px color-mix(in oklch, var(--color-primary) 26%, transparent), 0 10px 24px -5px color-mix(in oklch, var(--color-primary) 48%, transparent);
    }
  }

  :where([data-theme="cairn-admin"], [data-theme="cairn-admin-dark"]) .cairn-doc-title:focus {
    outline: 1px solid var(--color-primary);
  }

  @supports (color: color-mix(in lab, red, red)) {
    :where([data-theme="cairn-admin"], [data-theme="cairn-admin-dark"]) .cairn-doc-title:focus {
      outline: 1px solid color-mix(in oklab, var(--color-primary) 70%, transparent);

  /* The segmented-filter row (segBar + its trailing toggle chip) has no natural wrap point below
     640px: its members are single-line pill buttons, not text that reflows. Below the breakpoint it
     scrolls horizontally in its own row instead of forcing the whole page wider; at 640px and up it
     reverts to the normal wrapping row the desktop screens were designed for. */
  .cairn-segbar-row { display: flex; flex-wrap: nowrap; align-items: center; gap: .75rem; overflow-x: auto; padding-bottom: .25rem; }

    .cairn-segbar-row { flex-wrap: wrap; overflow-x: visible; padding-bottom: 0; }

  /* A status/type pill is a single-line label by definition. The compiled DaisyUI badge rule
     above doesn't pin white-space, so a two-word value (Boat parking, Small-boat rack) wraps and
     breaks the pill shape whenever its table column compresses below the label's natural width,
     as the asset-type and waitlist tables do at narrow viewports. */
  .badge { white-space: nowrap; }

function icon(name, cls) {
  cls = cls || 'h-4 w-4';
  return '<svg class="' + cls + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + (ICONS[name] || '') + '</svg>';
}
function initials(name) {
  return name.split(' ').filter(Boolean).map(function (p) { return p[0]; }).slice(0, 2).join('').toUpperCase();
}
function avatar(name, size) {
  size = size || 'h-9 w-9';
  return '<span class="' + size + ' flex flex-none items-center justify-center rounded-full bg-primary/10 text-primary text-xs font-semibold">' + initials(name) + '</span>';
}
function photoBox(label, extraCls, gradientFrom, gradientTo) {
  gradientFrom = gradientFrom || 'oklch(62% 0.09 250)';
  gradientTo = gradientTo || 'oklch(38% 0.06 280)';
  return '<div class="relative flex items-center justify-center overflow-hidden rounded-field border border-[var(--cairn-card-border)] ' + (extraCls || 'h-40 w-full') + '" style="background:linear-gradient(135deg,' + gradientFrom + ',' + gradientTo + ')">' +
    '<span class="text-center text-xs font-medium text-white/85 px-3">' + label + '</span></div>';
}

function navGroup(label, items, activeHref) {
  var rows = items.map(function (item) {
    var active = item.href === activeHref;
    return '<li><a href="' + item.href + '" class="' + (active ? 'bg-primary/10 font-semibold text-primary' : 'font-medium text-subtle') + '"' + (active ? ' aria-current="page"' : '') + '>' + icon(item.icon, 'h-4 w-4') + item.label + '</a></li>';
  }).join('');
  return (
    '<details class="px-2" open>' +
      '<summary class="group/sec flex cursor-pointer select-none items-center gap-2 rounded-field bg-base-content/[0.04] py-2 pl-5 pr-3 text-[0.6875rem] font-semibold uppercase tracking-[0.08em] text-muted transition-colors hover:bg-base-content/[0.08] hover:text-base-content">' +
        '<span class="truncate">' + label + '</span>' +
        icon('chevron-right', 'cairn-caret ml-auto h-3 w-3 shrink-0 opacity-50 transition-opacity group-hover/sec:opacity-90') +
      '</summary>' +
      '<ul class="menu menu-sm mt-1 w-full gap-0.5 p-0">' + rows + '</ul>' +
    '</details>'
  );
}

function buildNav(activeHref) {
  return (
    '<nav class="bg-base-100 flex min-h-full w-56 flex-col border-r border-[var(--cairn-card-border)]" aria-label="Site content">' +

        '</a>' +
      '</div>' +

/* ============================== SHELL ============================== */
function toggleTheme(id) {
  var el = document.getElementById(id);
  el.setAttribute('data-theme', el.getAttribute('data-theme') === 'cairn-admin' ? 'cairn-admin-dark' : 'cairn-admin');
}
function swapLens(scope, which) {
  var root = document.getElementById(scope);
  root.querySelectorAll('[data-lens]').forEach(function (el) {
    el.style.display = el.getAttribute('data-lens') === which ? '' : 'none';
  });
  root.querySelectorAll('[data-lens-btn]').forEach(function (btn) {
    var active = btn.getAttribute('data-lens-btn') === which;
    btn.classList.toggle('bg-primary/10', active);
    btn.classList.toggle('text-primary', active);
    btn.classList.toggle('font-medium', active);
    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
    var chk = btn.querySelector('[data-check]');
    if (chk) chk.style.display = active ? '' : 'none';
  });
}

function renderShell(opts) {
  var themeId = opts.id + '-theme';
  var drawerId = opts.id + '-drawer';
  var crumbsHtml;
  if (opts.crumbs && opts.crumbs.length > 1) {
    crumbsHtml = '<nav aria-label="Breadcrumb" class="breadcrumbs text-sm"><ul>' +
      opts.crumbs.map(function (c) {
        return '<li>' + (c.href ? '<a href="' + c.href + '">' + c.label + '</a>' : c.label) + '</li>';
      }).join('') + '</ul></nav>';
  } else {
    crumbsHtml = '<span class="font-semibold tracking-tight">' + SITE_NAME + '</span>';
  }

  var topbarCenter;
  if (opts.topbarMode === 'desk') {
    topbarCenter = opts.deskHtml;
  } else {
    topbarCenter =
      '<div class="flex min-w-0 flex-1 justify-center">' +
        '<button type="button" class="flex w-full max-w-md items-center gap-2 rounded-field border border-[var(--cairn-card-border)] bg-base-200/70 px-3 py-1.5 text-sm text-muted transition-colors hover:bg-base-200 hover:text-base-content">' +
          icon('search', 'h-4 w-4 shrink-0') +
          '<span class="truncate">Search or jump to&hellip;</span>' +
          '<kbd class="ml-auto hidden rounded border border-[var(--cairn-card-border)] px-1.5 text-[0.6875rem] font-medium sm:inline">&#8984;K</kbd>' +
        '</button>' +
      '</div>' +
      (opts.publishCount ? '<div class="flex-none"><button type="button" class="btn btn-primary btn-sm">Publish site (' + opts.publishCount + ')</button></div>' : '');
  }

  return (
    '<div data-theme="cairn-admin" id="' + themeId + '">' +
      '<div class="drawer lg:drawer-open min-h-screen bg-base-200 text-base-content">' +
        '<input id="' + drawerId + '" type="checkbox" class="drawer-toggle" />' +
        '<div class="drawer-content flex flex-col">' +
          '<div class="navbar bg-base-100 border-b border-[var(--cairn-card-border)] sticky top-0 z-30 h-16 min-h-16 gap-2 px-4 py-0 lg:px-8">' +
            '<div class="flex-none lg:hidden"><label for="' + drawerId + '" aria-label="Open menu" class="btn btn-square btn-ghost">' + icon('menu', 'h-5 w-5') + '</label></div>' +
            '<div class="hidden min-w-0 max-w-[30%] flex-none truncate sm:block">' + crumbsHtml + '</div>' +
            topbarCenter +
            '<div class="flex-none"><button type="button" class="btn btn-square btn-ghost" aria-label="Toggle theme" onclick="toggleTheme(\'' + themeId + '\')">' + icon('moon', 'h-5 w-5') + '</button></div>' +
          '</div>' +
          '<main class="flex-1 p-4 lg:px-10 lg:py-8">' + opts.main + '</main>' +
        '</div>' +
        '<div class="drawer-side">' +
          '<label for="' + drawerId + '" aria-label="Close menu" class="drawer-overlay"></label>' +
          buildNav(opts.activeHref) +
        '</div>' +
      '</div>' +
    '</div>'
  );
}

/* ============================== SHARED SNIPPETS ============================== */
var headerLabel = 'text-[0.6875rem] font-semibold uppercase tracking-[0.08em] text-muted';
function sortHeader(label, dir) {
  return '<button type="button" class="inline-flex items-center gap-1 ' + headerLabel + ' hover:text-base-content">' + label + ' ' +
    (dir ? icon(dir === 'asc' ? 'arrow-up' : 'arrow-down', 'h-3 w-3') : icon('chevrons-up-down', 'h-3 w-3 opacity-40')) + '</button>';
}
function segBar(groupLabel, segments, trailingHtml) {
  return (
    '<div class="mb-4 cairn-segbar-row">' +
      '<div role="group" aria-label="' + groupLabel + '" class="bg-base-100 inline-flex items-center overflow-hidden rounded-lg border border-[var(--cairn-card-border)]">' +
        segments.map(function (s, i) {
          return '<button type="button" class="inline-flex items-center gap-1.5 px-3 py-1 text-[0.8125rem] font-normal ' + (i > 0 ? 'border-l border-[var(--cairn-card-border)] ' : '') + (s.active ? 'bg-primary/10 text-primary font-medium' : 'text-muted hover:bg-base-content/[0.06]') + '" aria-pressed="' + (s.active ? 'true' : 'false') + '">' +
            (s.active ? icon('check', 'h-3 w-3') : '') + s.label + '<span class="tabular-nums">' + s.count + '</span></button>';
        }).join('') +
      '</div>' +
      (trailingHtml || '') +
    '</div>'
  );
}
function toggleChip(label, count, active) {
  return '<button type="button" class="inline-flex items-center gap-1.5 rounded-lg px-3 py-1 text-[0.8125rem] font-normal hover:bg-base-content/[0.06] ' + (active ? 'bg-primary/10 text-primary font-medium' : 'text-muted') + '" aria-pressed="' + (active ? 'true' : 'false') + '">' + (active ? icon('check', 'h-3 w-3') : '') + label + '<span class="tabular-nums">' + count + '</span></button>';
}
function fieldLabel(text) { return '<span class="text-sm font-medium">' + text + '</span>'; }
function textField(label, value, help) {
  return '<label class="flex flex-col gap-1">' + fieldLabel(label) +
    '<input class="input input-sm" value="' + value + '" />' +
    (help ? '<p class="fld-hint mt-1 text-sm text-muted">' + help + '</p>' : '') + '</label>';
}
function selectField(label, options, selected, help) {
  return '<label class="flex flex-col gap-1">' + fieldLabel(label) +
    '<select class="select select-sm">' + options.map(function (o) { return '<option' + (o === selected ? ' selected' : '') + '>' + o + '</option>'; }).join('') + '</select>' +
    (help ? '<p class="fld-hint mt-1 text-sm text-muted">' + help + '</p>' : '') + '</label>';
}
