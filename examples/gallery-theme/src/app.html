<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      // The no-flash theme read, mirroring the cairn theme's and AstroPaper's own head script:
      // runs synchronously before first paint, so a returning visitor's explicit choice never
      // flashes the system default first. No cookie leaves `data-theme` unset, and theme.css's own
      // prefers-color-scheme block picks the system scheme (dark by default, matching the upstream
      // demo) with no JS involved at all.
      (function () {
        var match = document.cookie.match(/(?:^|; )gallery-site-theme=(gallery|gallery-light)(?:;|$)/);
        if (match) document.documentElement.setAttribute('data-theme', match[1]);
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div>%sveltekit.body%</div>
  </body>
</html>
